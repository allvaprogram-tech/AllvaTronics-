<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="error-overlay" style="position:fixed; z-index:9999; background: rgba(255,0,0,0.8); color: white; display:none; padding:20px; font-family: monospace;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML += msg + '<br/>' + (error ? error.stack : '') + '<hr/>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML += 'Unhandled Promise Rejection: ' + event.reason + '<br/>' + (event.reason ? event.reason.stack : '') + '<hr/>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
